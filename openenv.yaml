name: "cyber_ticket_env"
entry_point: "server.app:app"
backend:
  type: "docker"
  build: "."
  port: 7860
tasks:
  - id: "categorize_task"
    difficulty: "easy"
    entrypoint: "server.tasks:CategorizeTask"
  - id: "priority_task"
    difficulty: "medium"
    entrypoint: "server.tasks:PriorityTask"
  - id: "resolution_task"
    difficulty: "hard"
    entrypoint: "server.tasks:ResolutionTask"
