name: "cyber_ticket_env"
entry_point: "server.app:app"
backend:
  type: "docker"
  build: "."
  port: 7860
tasks:
  - id: "categorize_ticket"
    difficulty: "easy"
    entrypoint: "server.tasks:CategorizeTicketTask"
  - id: "priority_assignment"
    difficulty: "medium"
    entrypoint: "server.tasks:PriorityAssignmentTask"
  - id: "resolution_draft"
    difficulty: "hard"
    entrypoint: "server.tasks:ResolutionDraftTask"
